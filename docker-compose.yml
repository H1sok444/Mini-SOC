version: "3.8"

networks:
  wazuh-net:
    driver: overlay
    attachable: true

services:
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.9.0
    hostname: wazuh-indexer
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      - cluster.name=wazuh-cluster
      - node.name=wazuh-indexer
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - wazuh-indexer-data:/usr/share/wazuh-indexer/data
    networks:
      - wazuh-net

  wazuh-manager:
    image: wazuh/wazuh-manager:4.9.0
    hostname: wazuh-manager
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      - INDEXER_HOST=wazuh-indexer
    ports:
      - "1514:1514"     # Syslog / Agent logs
      - "1515:1515"     # Wazuh cluster comms
      - "55000:55000"   # Agent enrollment API
    networks:
      - wazuh-net
    depends_on:
      - wazuh-indexer

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.9.0
    hostname: wazuh-dashboard
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      - INDEXER_HOST=wazuh-indexer
      - WAZUH_MANAGER=wazuh-manager
    ports:
      - "5601:5601"     # Dashboard
    networks:
      - wazuh-net
    depends_on:
      - wazuh-indexer
      - wazuh-manager

volumes:
  wazuh-indexer-data:

